  const s=Math.min((r*2-4)/im.naturalWidth,(r*2-4)/im.naturalHeight)*
          (n.group==='country'?1:1), iw=im.naturalWidth*s, ih=im.naturalHeight*s;
  // country는 꽉차게(cover), 로고는 contain
  const cov=(n.group==='country'||n.group==='person');
  const sc=cov?Math.max((r*2-4)/im.naturalWidth,(r*2-4)/im.naturalHeight):s;
  const W=im.naturalWidth*sc, H=im.naturalHeight*sc;
  ctx.drawImage(im,n.x-W/2,n.y-H/2,W,H); ctx.restore();
 } else {
  ctx.fillStyle=n.group==='country'?'#c9d4e3':'#1a2230'; ctx.font='700 '+Math.max(9,r*0.4)+'px Pretendard';
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(fit(n.label,6), n.x, n.y);
 }
 // 라벨(하단)
 ctx.globalAlpha=al*(dim?1:1);
 ctx.fillStyle='#e9edf3'; ctx.font='600 '+Math.max(10,12/Math.max(1,scale*0.9))+'px Pretendard';
 ctx.textAlign='center'; ctx.textBaseline='top';
 ctx.shadowColor='#000'; ctx.shadowBlur=4;
 ctx.fillText(fit(n.label,14), n.x, n.y+r+3); ctx.shadowBlur=0;
 n.__w=r*2; n.__h=r*2; ctx.restore();
}
function paintNode(n,color,ctx){ const w=n.__w||52,h=n.__h||52; ctx.fillStyle=color; ctx.fillRect(n.x-w/2,n.y-h/2,w,h); }

// ── 선 렌더 (여명의 빛 라벨 박스) ──
function drawLink(l,ctx,scale){
 const s=l.source,t=l.target; if(!s.x||!t.x) return;
 const dimS=(curTr!=='all'&&s.track!==curTr&&t.track!==curTr);
 const foc=selId||hoverId;
 const active=(selLink===l)||(foc&&(l.from===foc||l.to===foc));
 // ★기본은 아주 옅게(격자 위 노이즈 억제). 활성 선·급소만 진하게.
 let al;
 if(dimS) al=0.03;
 else if(active) al=0.95;
 else if(foc) al=0.05;              // 다른 노드 포커스 중 — 무관 선 죽임
 else al=l.keystone?0.6:(l.verdict==='반증'||l.verdict==='배제'?0.32:0.14);
 ctx.save(); ctx.globalAlpha=al;
 const col=V[l.verdict]||'#57606a';
 const banz=(l.verdict==='반증'||l.verdict==='배제');
 ctx.strokeStyle=col; ctx.lineWidth=(active?1.5:1)*(l.keystone?3.5:(l.verdict==='확립'?1.8:1.3));
 if(l.verdict==='배제'){ ctx.setLineDash([7,5]); }
 ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(t.x,t.y); ctx.stroke(); ctx.setLineDash([]);
 const mx=(s.x+t.x)/2, my=(s.y+t.y)/2;
 // 화살표·⊘는 활성 or 급소 or 반증일 때만(잔선엔 생략해 깔끔)
 if(active||l.keystone||banz){
  const ang=Math.atan2(t.y-s.y,t.x-s.x), r=rad(t);
  const ax=t.x-Math.cos(ang)*r, ay=t.y-Math.sin(ang)*r, hl=9;
  ctx.fillStyle=col; ctx.beginPath();
  ctx.moveTo(ax,ay); ctx.lineTo(ax-Math.cos(ang-0.4)*hl,ay-Math.sin(ang-0.4)*hl);
  ctx.lineTo(ax-Math.cos(ang+0.4)*hl,ay-Math.sin(ang+0.4)*hl); ctx.closePath(); ctx.fill();
  if(banz){ ctx.strokeStyle=col; ctx.lineWidth=2.2; ctx.beginPath(); ctx.arc(mx,my,7,0,7); ctx.stroke();
   ctx.beginPath(); ctx.moveTo(mx-5,my-5); ctx.lineTo(mx+5,my+5); ctx.stroke(); }
 }
 // 라벨 박스 — 표시 여부는 onRenderFramePre의 충돌회피가 이미 _labelSet에 결정해 뒀다.
 const sel=(selLink===l);
 if(_labelSet.has(l)){
  const fs=Math.max(10.5, 11.5/Math.max(1,scale*0.75));
  ctx.font='600 '+fs+'px Pretendard'; const tw=ctx.measureText(l.label).width;
  const pad=6, bw=tw+pad*2, bh=fs+7, oy=banz?14:0;
  ctx.globalAlpha=0.97;
  ctx.fillStyle=banz?'#3a1418':(l.keystone?'#463405':'#111823');
  rr(ctx,mx-bw/2,my-bh/2+oy,bw,bh,5); ctx.fill();
  ctx.strokeStyle=l.keystone?'#ffd23f':(banz?'#ff5555':(sel?'#1f6feb':'#2a3547')); ctx.lineWidth=sel?1.6:1; ctx.stroke();
  ctx.fillStyle=l.keystone?'#ffd23f':'#cdd8e6'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(l.label, mx, my+oy);
 }
 ctx.restore();
}

// ── 유틸 ──
function rr(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y);
 ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
 ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function fit(s,n){ s=(s||'').replace(/\n/g,' '); return s.length>n? s.slice(0,n-1)+'…':s; }
function redraw(){ G.nodeCanvasObject(drawNode).linkCanvasObject(drawLink); }

// ── 인터랙션 ──
function openNode(n){ selId=n.id; selLink=null; buildAdj(); const b=document.getElementById('pbody');
 const claims=links.filter(l=>l.from===n.id||l.to===n.id);
 b.innerHTML='<h2>'+esc(n.label.replace(/\n/g,' '))+'</h2>'+
  '<div class=meta>'+({aweb:'A-WEB 축',fraud:'부정선거 축',bridge:'교차'}[n.track]||'')+' · '+esc(n.pillar||'')+
  ' · <span class="vpill v-'+n.verdict+'">'+n.verdict+'</span></div>'+
  (n.badges&&n.badges.length?'<div class=gist>'+n.badges.map(esc).join('<br>')+'</div>':'')+
  '<div class=claims><b style="font-size:11px;color:#8ea3bd">이 실체가 걸린 관계 '+claims.length+'건</b>'+
   claims.slice(0,8).map(l=>'<div class=c>'+esc(l.label)+'</div>').join('')+'</div>'+
  '<a class=warp href="통합맵.html#'+n.id+'" target=_blank>3D에서 근거·증거 보기 →</a>';
 document.getElementById('panel').classList.add('on'); redraw();
}
function openLink(l){ selId=null; selLink=l; buildAdj(); const b=document.getElementById('pbody');
 const cs=(l.claims||[]);
 b.innerHTML='<h2>'+esc((l.source.label||l.from).replace(/\n/g,' '))+' → '+esc((l.target.label||l.to).replace(/\n/g,' '))+'</h2>'+
  '<div class=meta><span class="vpill v-'+l.verdict+'">'+l.verdict+'</span>'+(l.keystone?' · <span class="vpill" style="background:#4a3a08;color:#ffd23f">급소</span>':'')+'</div>'+
  '<div class=gist>'+esc(l.label)+'</div>'+
  '<div class=claims><b style="font-size:11px;color:#8ea3bd">근거 명제 '+cs.length+'건 (상세는 3D)</b>'+
   (cs.length?cs.map(c=>'<div class=c>'+esc(c)+'</div>').join(''):'<div class=c style=color:#6b7a90>직접 관계 — 접힌 명제 없음</div>')+'</div>'+
  '<a class=warp href="통합맵.html" target=_blank>3D에서 이 관계 보기 →</a>';
 document.getElementById('panel').classList.add('on'); redraw();
}
function closeP(){ document.getElementById('panel').classList.remove('on'); selId=null; selLink=null; buildAdj(); redraw(); }
function esc(s){ return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

// ── 컨트롤 ──
document.querySelectorAll('#ctl button[data-tr]').forEach(b=>b.onclick=()=>{
 curTr=b.dataset.tr; document.querySelectorAll('#ctl button[data-tr]').forEach(x=>x.classList.toggle('on',x===b)); redraw(); });
document.getElementById('lbltog').onclick=function(){ showLabel=!showLabel;
 this.textContent='선 라벨 '+(showLabel?'ON':'OFF');
 this.style.background=showLabel?'#1f6feb':'#131a26'; this.style.color=showLabel?'#fff':'#c9d4e3';
 this.style.borderColor=showLabel?'#1f6feb':'#2a3547'; redraw(); };
// 딥링크 #id
function gotoNode(id){ const n=nodes.find(x=>x.id===decodeURIComponent(id));
 if(n){ openNode(n); G.centerAt(n.x,n.y,800); G.zoom(2.2,800); } return !!n; }
if(location.hash) setTimeout(()=>gotoNode(location.hash.slice(1)),1400);
window.__dbg=()=>({selId,hoverId,hash:location.hash,adjN:_adjN.size,nnodes:nodes.length,hasNec:!!nodes.find(n=>n.id==='nec')});
window.__focus=gotoNode;
</script></body></html>
